components:
  schemas:
    ConflictError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: number
          enum:
            - 409
        message:
          type: string
          enum:
            - 'Conflict: Duplicate resource or constraint violation'
      allOf:
        - $ref: '#/components/schemas/Error'
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
        exception:
          type: string
        exc_type:
          type: string
    ForbiddenError:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: number
          enum:
            - 403
        message:
